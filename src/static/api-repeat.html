<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>API调试工具</title>
    <style>
      /* 全局样式重置 */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* 页面主体容器 */
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto",
          "Helvetica Neue", Arial, sans-serif;
        background-color: #f5f5f5;
        padding: 20px;
      }

      /* 主容器样式 */
      .container {
        max-width: 1400px;
        margin: 0 auto;
        background-color: #ffffff;
        border-radius: 8px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
        overflow: hidden;
      }

      /* 页面头部 */
      .page-header {
        padding: 24px 24px 16px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #ffffff;
        border-bottom: 1px solid #e5e7eb;
      }

      .page-title {
        font-size: 22px;
        font-weight: 700;
        margin: 0 0 6px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .page-subtitle {
        font-size: 13px;
        opacity: 0.9;
        margin: 0;
      }

      /* 顶部工具栏 */
      .toolbar {
        display: flex;
        align-items: center;
        gap: 15px;
        padding: 16px 24px;
        background-color: #ffffff;
        border-bottom: 1px solid #e5e7eb;
      }

      /* 按钮基础样式 */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 18px;
        font-size: 14px;
        font-weight: 500;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      /* 运行按钮样式 - 蓝色主题 */
      .btn-primary {
        background-color: #3b82f6;
        color: #ffffff;
      }

      .btn-primary:hover {
        background-color: #2563eb;
        transform: translateY(-1px);
        box-shadow: 0 4px 8px rgba(59, 130, 246, 0.3);
      }

      /* 清空按钮样式 - 红色边框 */
      .btn-outline-danger {
        background-color: transparent;
        color: #dc2626;
        border: 1px solid #dc2626;
      }

      .btn-outline-danger:hover {
        background-color: #fef2f2;
        border-color: #b91c1c;
        transform: translateY(-1px);
      }

      /* 配置按钮样式 - 灰色边框 */
      .btn-outline-secondary {
        background-color: transparent;
        color: #6b7280;
        border: 1px solid #d1d5db;
      }

      .btn-outline-secondary:hover {
        background-color: #f9fafb;
        border-color: #9ca3af;
        transform: translateY(-1px);
      }

      /* 配置弹窗遮罩层 */
      .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        justify-content: center;
        align-items: center;
      }

      .modal-overlay.active {
        display: flex;
      }

      /* 弹窗内容 */
      .modal-content {
        background-color: #ffffff;
        border-radius: 8px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        width: 400px;
        max-width: 90vw;
        overflow: hidden;
      }

      /* 弹窗头部 */
      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
        border-bottom: 1px solid #e5e7eb;
      }

      .modal-title {
        font-size: 16px;
        font-weight: 600;
        color: #1f2937;
        margin: 0;
      }

      .modal-close {
        background: none;
        border: none;
        font-size: 24px;
        color: #9ca3af;
        cursor: pointer;
        padding: 0;
        line-height: 1;
        transition: color 0.2s;
      }

      .modal-close:hover {
        color: #374151;
      }

      /* 弹窗主体 */
      .modal-body {
        padding: 20px;
      }

      .form-group {
        margin-bottom: 16px;
      }

      .form-group:last-child {
        margin-bottom: 0;
      }

      .form-label {
        display: block;
        font-size: 14px;
        font-weight: 500;
        color: #374151;
        margin-bottom: 6px;
      }

      .form-input {
        width: 100%;
        padding: 8px 12px;
        font-size: 14px;
        border: 1px solid #d1d5db;
        border-radius: 4px;
        outline: none;
        transition: border-color 0.2s;
        box-sizing: border-box;
      }

      .form-input:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      }

      .form-hint {
        display: block;
        font-size: 12px;
        color: #9ca3af;
        margin-top: 4px;
      }

      /* 弹窗底部 */
      .modal-footer {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        padding: 16px 20px;
        border-top: 1px solid #e5e7eb;
        background-color: #f9fafb;
      }

      /* 内容区域布局 */
      .main-content {
        display: flex;
        height: 600px;
      }

      /* 左侧代码编辑器区域 */
      .editor-panel {
        flex: 1;
        display: flex;
        border-right: 1px solid #e5e7eb;
        overflow: hidden;
      }

      /* 编辑器包装器 */
      .editor-wrapper {
        flex: 1;
        display: flex;
        background-color: #1e1e1e;
        position: relative;
      }

      /* 行号显示区域 */
      .line-numbers {
        width: 50px;
        background-color: #252526;
        color: #858585;
        font-family: "Consolas", "Monaco", "Courier New", monospace;
        font-size: 13px;
        line-height: 21px;
        padding: 10px 8px;
        text-align: right;
        user-select: none;
        overflow-y: hidden;
        border-right: 1px solid #333333;
      }

      /* 代码输入区域 */
      .code-editor {
        flex: 1;
        background-color: #1e1e1e;
        color: #d4d4d4;
        font-family: "Consolas", "Monaco", "Courier New", monospace;
        font-size: 13px;
        line-height: 21px;
        padding: 10px 12px;
        border: none;
        outline: none;
        resize: none;
        overflow-y: auto;
        white-space: pre;
        tab-size: 4;
      }

      /* 代码编辑器滚动条样式 */
      .code-editor::-webkit-scrollbar,
      .result-area::-webkit-scrollbar {
        width: 12px;
        height: 12px;
      }

      .code-editor::-webkit-scrollbar-track,
      .result-area::-webkit-scrollbar-track {
        background: #2d2d2d;
      }

      .code-editor::-webkit-scrollbar-thumb,
      .result-area::-webkit-scrollbar-thumb {
        background: #555555;
        border-radius: 6px;
      }

      .code-editor::-webkit-scrollbar-thumb:hover,
      .result-area::-webkit-scrollbar-thumb:hover {
        background: #666666;
      }

      /* 右侧结果显示区域 */
      .result-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* 结果标题栏 */
      .result-header {
        padding: 12px 20px;
        background-color: #f9fafb;
        border-bottom: 1px solid #e5e7eb;
        color: #6b7280;
        font-size: 13px;
        font-weight: 500;
      }

      /* 结果内容显示区域 */
      .result-area {
        flex: 1;
        padding: 0;
        background-color: #ffffff;
        color: #374151;
        font-family: "Consolas", "Monaco", "Courier New", monospace;
        font-size: 13px;
        line-height: 1.6;
        overflow-y: auto;
        overflow-x: auto;
      }
      .result-line {
        display: flex;
        align-items: center;
        padding: 8px 12px;
        border-bottom: 1px solid #e5e7eb;
        font-size: 13px;
        font-family: "Consolas", "Monaco", "Courier New", monospace;
        min-width: 100%;
        width: fit-content;
      }
      /* 结果为空时的提示文字 */
      .placeholder-text {
        color: #9ca3af;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <!-- 主容器 -->
    <div class="container">
      <!-- 页面标题 -->
      <div class="page-header">
        <h1 class="page-title">🔧 API 调试执行工具</h1>
        <p class="page-subtitle">快速测试和调试您的 API 请求</p>
      </div>

      <!-- 顶部工具栏 -->
      <div class="toolbar">
        <!-- 点击运行按钮 -->
        <button class="btn btn-primary" id="btnRun" title="执行fetch代码">
          ▶ 点击运行
        </button>
        <!-- 清空按钮 -->
        <button
          class="btn btn-outline-danger"
          id="btnClear"
          title="清空所有内容"
        >
          🗑 清空
        </button>
        <!-- 配置按钮 -->
        <button
          class="btn btn-outline-secondary"
          id="btnConfig"
          title="配置运行参数"
        >
          ⚙️ 配置
        </button>
      </div>

      <!-- 配置弹窗 -->
      <div class="modal-overlay" id="configModal">
        <div class="modal-content">
          <div class="modal-header">
            <h3 class="modal-title">⚙️ 运行配置</h3>
            <button class="modal-close" id="btnCloseModal">&times;</button>
          </div>
          <div class="modal-body">
            <div class="form-group">
              <label class="form-label" for="callCount">调用次数</label>
              <input
                type="number"
                class="form-input"
                id="callCount"
                min="1"
                max="1000"
                value="1"
                placeholder="请输入调用次数"
              />
              <span class="form-hint">范围：1-1000 次</span>
            </div>
            <div class="form-group">
              <label class="form-label" for="callInterval">调用间隔（毫秒）</label>
              <input
                type="number"
                class="form-input"
                id="callInterval"
                min="0"
                max="60000"
                value="0"
                placeholder="请输入调用间隔"
              />
              <span class="form-hint">范围：0-60000 毫秒</span>
            </div>
            <div class="form-group">
              <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                <input type="checkbox" id="enableTimedExecution" style="width: 18px; height: 18px;" />
                <span class="form-label" style="margin-bottom: 0;">开启定时执行</span>
              </label>
            </div>
            <div class="form-group" id="timedDelayGroup" style="display: none;">
              <label class="form-label" for="timedDelay">定时时间</label>
              <input
                type="time"
                class="form-input"
                id="timedDelay"
                step="1"
              />
              <span class="form-hint">选择定时执行的具体时间</span>
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-outline-secondary" id="btnResetConfig">
              🔄 重置
            </button>
            <button class="btn btn-primary" id="btnConfirmConfig">
              ✓ 确认
            </button>
          </div>
        </div>
      </div>

      <!-- 主内容区域 -->
      <div class="main-content">
        <!-- 左侧代码编辑器面板 -->
        <div class="editor-panel">
          <div class="editor-wrapper">
            <!-- 行号显示 -->
            <div class="line-numbers" id="lineNumbers">1</div>
            <!-- 代码输入区 -->
            <textarea
              class="code-editor"
              id="codeEditor"
              spellcheck="false"
              placeholder="在此输入fetch代码..."
            >
fetch('https://jsonplaceholder.typicode.com/posts/1', {
  'headers': {
    'accept': 'application/json',
    'content-type': 'application/json'
  },
  'method': 'GET'
});
        </textarea
            >
          </div>
        </div>

        <!-- 右侧结果面板 -->
        <div class="result-panel">
          <!-- 结果标题 -->
          <div class="result-header">运行结果......</div>
          <!-- 结果显示区域 -->
          <div class="result-area" id="resultArea">
            <span class="placeholder-text">运行结果将在这里显示...</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 引入外部JavaScript文件（符合CSP安全策略） -->
    <script src="api-repeat.js"></script>
  </body>
</html>
